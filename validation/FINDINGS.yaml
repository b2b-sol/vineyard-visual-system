schema_version: "1.0"
updated_at: "2026-07-13T20:42:00-07:00"
findings:
  - id: FIND-001
    severity: P1
    status: resolved
    title: Gate and completion claims were self-asserted
    description: The validator did not read the DoD matrix or require evidence and commit provenance for passed gates.
    artifact_refs:
      [
        control/DOD_MATRIX.yaml,
        validation/gate-results.json,
        scripts/validation/validate.mjs,
      ]
    resolution: Added a strict DoD schema, exact G0-G12 parity, non-empty evidence checks, commit SHAs, and whole-project completion invariants.
  - id: FIND-002
    severity: P1
    status: resolved
    title: Trace validation inspected only the first registry record
    description: Later records could have invalid references or remain semantically untraced while validation stayed green.
    artifact_refs:
      [
        scripts/validation/validate.mjs,
        control/trace-nodes.json,
        control/trace-edges.json,
      ]
    resolution: Validation now indexes every record, enforces unique IDs and canonical paths, resolves all references, and requires semantic edges and complete chains.
  - id: FIND-003
    severity: P1
    status: resolved
    title: Walking-slice state and source locators disagreed
    description: Scenario and fixture history skipped observed, the screen omitted completed, and a bold paragraph was accepted as a heading.
    artifact_refs:
      [
        scenarios/walking-slice.json,
        data/walking-slice.json,
        screens/walking-slice.json,
        control/trace-nodes.json,
      ]
    resolution: Aligned all nine workflow transitions, registered completed, pointed to a real source heading, and made heading resolution structural.
  - id: FIND-004
    severity: P1
    status: resolved
    title: Fixture contract required one resolved blocker path
    description: Every work order was forced to include a resolved blocker and verified actuals, excluding normal and open states.
    artifact_refs:
      [
        schemas/fixture.schema.json,
        scripts/validation/validate.mjs,
        atlas/tests/unit/canonical-model.test.ts,
      ]
    resolution: Generalized blockers and actuals with state-conditional requirements and added unit coverage for open and invalid verified records.
  - id: FIND-005
    severity: P1
    status: resolved
    title: Repository secret audit had major blind spots
    description: The audit skipped unlisted file types and recognized too few common credential formats.
    artifact_refs:
      [scripts/repository-audit.mjs, .github/workflows/repository-audit.yml]
    resolution: Every repository blob is scanned locally and a pinned TruffleHog 3.95.9 history scan now runs in the required audit job.
  - id: FIND-006
    severity: P2
    status: resolved
    title: Manual Pages deployment could bypass verification
    description: A manually dispatched non-main ref could deploy after a build without the aggregate quality checks.
    artifact_refs: [.github/workflows/pages.yml]
    resolution: The Pages build is guarded to main and now runs the complete verify command before artifact upload.
  - id: FIND-007
    severity: P2
    status: resolved
    title: Empty unit suite passed required CI
    description: Vitest was configured to pass when no test files existed.
    artifact_refs:
      [package.json, vitest.config.ts, atlas/tests/unit/canonical-model.test.ts]
    resolution: Removed every no-tests bypass and added canonical transition, history, accessibility-contract, and schema-generalization tests.
  - id: FIND-008
    severity: P3
    status: resolved
    title: Repository audit required Git metadata
    description: Verification could not run from a public GitHub source archive without a .git directory.
    artifact_refs: [scripts/repository-audit.mjs]
    resolution: Added deterministic recursive source enumeration when Git metadata is absent while excluding generated directories.
  - id: FIND-009
    severity: P0
    status: resolved
    title: Registered screen did not realize FIX-001
    description: The page showed unrelated Mesa Alta data instead of the trace-claimed Carneros Ridge blocked mowing fixture.
    artifact_refs:
      [
        data/walking-slice.json,
        atlas/src/data/planningDispatch.ts,
        atlas/src/pages/PlanningDispatchPage.tsx,
      ]
    resolution: SCR-001 now imports FIX-001 through a typed adapter and renders its stable block, work order, acreage, blocker, actors, and nine-event history.
  - id: FIND-010
    severity: P1
    status: resolved
    title: Consequential workflow actions were inert
    description: Partial completion, repair release, verification, and immutable history inspection were specified but not usable.
    artifact_refs:
      [
        construction-packets/walking-slice.json,
        atlas/src/pages/PlanningDispatchPage.tsx,
      ]
    resolution: ACT-001 through ACT-004 now replay validated, attributed, timestamped, append-only events with permission-specific actors and history inspection.
  - id: FIND-011
    severity: P1
    status: resolved
    title: Mobile field behavior was only a static preview
    description: Field progress and problem reporting lacked offline queue, conflict, permissions, and accountable audit behavior.
    artifact_refs:
      [atlas/src/pages/PlanningDispatchPage.tsx, screens/walking-slice.json]
    resolution: Mobile defaults to an actionable field mode with acreage validation, local queue state, conflict detection, newer-server authority, and no-overwrite resolution.
  - id: FIND-012
    severity: P1
    status: resolved
    title: Browser checks did not prove fixture realization
    description: Tests asserted generic labels but not fixture identity, transitions, permissions, history, or action outcomes.
    artifact_refs:
      [atlas/tests/factory.e2e.spec.ts, validation/gate-results.json]
    resolution: Playwright now proves FIX-001 identity, all recovery transitions, final verification, actor history, mobile offline queueing, and conflict resolution on desktop and Pixel 7.
  - id: FIND-013
    severity: P2
    status: resolved
    title: Queue filter and selection could diverge
    description: Filtering could leave the detail panel focused on an order that no longer appeared in the queue.
    artifact_refs:
      [
        atlas/src/pages/PlanningDispatchPage.tsx,
        atlas/src/components/WorkOrderQueue.tsx,
      ]
    resolution: Filter changes select a visible row, derive review counts from filtered data, and announce the resulting selection.
  - id: FIND-014
    severity: P2
    status: resolved
    title: Field readability and selection announcements need proof
    description: Tiny mobile metadata and unannounced selection changes weakened task-level accessibility beyond axe smoke coverage.
    artifact_refs:
      [atlas/src/styles.css, atlas/src/pages/PlanningDispatchPage.tsx]
    resolution: Increased field text sizing and contrast, added live selection announcements and focus movement, and rechecked both viewports with zero serious or critical axe findings.
  - id: FIND-015
    severity: P2
    status: resolved
    title: Commit provenance accepted fabricated SHAs
    description: Evidence records required a non-empty commit string but did not prove that it resolved, was reachable from HEAD, or contained the claimed artifacts.
    artifact_refs:
      [
        scripts/validation/validate.mjs,
        control/TASK_REGISTRY.yaml,
        validation/gate-results.json,
      ]
    resolution: Git-backed validation now requires every cited commit to resolve, be an ancestor of HEAD, and contain every claimed artifact; source archives without Git metadata retain explicit schema-level validation.
  - id: FIND-016
    severity: P2
    status: resolved
    title: Provenance validation lacked CI history
    description: The quality and Pages workflows used shallow checkouts, so legitimate historical evidence commits could not resolve under GitHub Actions.
    artifact_refs: [.github/workflows/ci.yml, .github/workflows/pages.yml]
    resolution: Every workflow that runs full provenance validation now checks out complete Git history before evaluating evidence commits.
  - id: FIND-017
    severity: P1
    status: resolved
    title: Squash merge invalidated branch-local evidence SHAs
    description: Main-branch validation correctly rejected task and gate commits that existed only on the squashed PR branch and were not part of main history.
    artifact_refs:
      [
        control/TASK_REGISTRY.yaml,
        validation/gate-results.json,
        scripts/validation/validate.mjs,
      ]
    resolution: All factory artifacts now cite the immutable main squash commit that introduced them; future evidence records cite target-branch commits after merge reconciliation.
  - id: FIND-018
    severity: P1
    status: resolved
    title: Canonical workflow states lacked complete operational graphs
    description: Sixty-seven declared states were disconnected because the ontology recorded ordered happy-path steps without explicit decision, exception, recovery, supersession, and terminal edges.
    artifact_refs:
      [workflow-model/workflows.json, schemas/canonical-workflow.schema.json]
    resolution: Added 235 typed, attributable transitions with explicit terminal states and graph validation proving every state is reachable from entry and can reach a terminal disposition.
  - id: FIND-019
    severity: P1
    status: resolved
    title: Ontology relationships were mechanically Cartesian
    description: Decisions, exceptions, roles, and records inherited whole-workflow relationship sets that did not distinguish operational responsibility or evidence use.
    artifact_refs:
      [
        workflow-model/decisions.json,
        workflow-model/exceptions.json,
        workflow-model/records.json,
        workflow-model/roles.json,
        scripts/refine-workflow-ontology.mjs,
      ]
    resolution: Rebuilt relationships from explicit read, write, authority, interruption, recovery, and accountability profiles; reciprocal links and proper-subset constraints now reject mechanical expansion.
  - id: FIND-020
    severity: P1
    status: resolved
    title: Consequential decisions appeared on incorrect workflow branches
    description: Irrigation approval was assigned to delivery verification, crew briefing was labeled as approval, application reporting had no completeness authority, and certification correction was embedded in the normal path.
    artifact_refs:
      [
        workflow-model/workflows.json,
        workflow-model/decisions.json,
        workflow-model/exceptions.json,
      ]
    resolution: Added manager irrigation approval and application-report completeness decisions, corrected crew briefing semantics, and separated direct certification from independently verified corrective-action recovery.
  - id: FIND-021
    severity: P1
    status: resolved
    title: Hazard overlay contradicted normalized evidence scope
    description: OVL-006 applied the hazard and urgent-replanning claim to WF-004 even though EVD-012 explicitly excludes that family.
    artifact_refs: [workflow-model/overlays.json, source/evidence.json]
    resolution: Removed WF-004 from OVL-006 and added exact overlay-coverage validation against the normalized evidence mappings.
  - id: FIND-022
    severity: P2
    status: resolved
    title: Role layers and record lifecycles obscured operating reality
    description: Three role layers omitted ownership governance and outside parties, while repeated lifecycle templates described unlike records with the same generic progression.
    artifact_refs: [workflow-model/roles.json, workflow-model/records.json]
    resolution: Established five organizational layers, added Owner or GM and Assistant Vineyard Manager roles, and introduced seventeen semantically checked lifecycle signatures with attributable correction ordering.
  - id: FIND-023
    severity: P2
    status: resolved
    title: Editable workflow visuals lacked deterministic render validation
    description: Generated Mermaid sources could remain hash-current while containing syntax that failed to render in CI or downstream handoff tooling.
    artifact_refs:
      [
        workflow-model/visuals,
        scripts/validate-mermaid.mjs,
        .github/workflows/visual-validation.yml,
      ]
    resolution: Locked Mermaid CLI 11.12.0 and added a deterministic render pass for all 36 editable diagrams to the aggregate verifier and visual-validation workflow.
  - id: FIND-024
    severity: P1
    status: resolved
    title: Factory walking slice bypassed canonical approval and acknowledgement
    description: The original WF-001 fixture used legacy planned-to-assigned and assigned-to-in-progress shortcuts plus a noncanonical ready-to-resume state.
    artifact_refs:
      [
        data/walking-slice.json,
        scenarios/walking-slice.json,
        screens/walking-slice.json,
        atlas/tests/unit/canonical-model.test.ts,
      ]
    resolution: Replayed FIX-001 through approval, assignment acknowledgement, partial completion, remaining-scope assignment, blocked-to-assigned recovery, renewed acknowledgement, completion, and verification; unit and browser tests now resolve actions against canonical transitions and owners.
  - id: FIND-025
    severity: P1
    status: resolved
    title: Mermaid renderer could not launch in the GitHub runner sandbox
    description: The locked Mermaid renderer passed locally but Puppeteer could not start Chromium under the Ubuntu runner's disabled unprivileged user namespace policy.
    artifact_refs:
      [
        scripts/validate-mermaid.mjs,
        scripts/mermaid-puppeteer.ci.json,
        .github/workflows/visual-validation.yml,
      ]
    resolution: Added an explicit CI-only Puppeteer configuration that disables the unavailable Chromium sandbox inside the ephemeral GitHub runner while retaining the default local launch configuration.
  - id: FIND-026
    severity: P1
    status: resolved
    title: Generated record references crossed unrelated workflow scopes
    description: The first full-season graph reused one record instance per canonical definition across unrelated workflow instances, scopes, and blocks; many references preceded record effectiveness or followed the recorded current version.
    artifact_refs:
      [scripts/generate-data.ts, data/operation.json, data/events.json]
    resolution: Rebuilt record instances around workflow-instance plans and shared operational cases; validators now enforce workflow, scope, block, effective-time, source-event, and current-version coherence for every event reference.
  - id: FIND-027
    severity: P1
    status: resolved
    title: Exception and operational-chain histories were not reciprocal
    description: Exception histories named recovery events that did not link back to the history, recovery_state frequently held the terminal state rather than the canonical recovery state, and all four harvest-to-settlement chains cited unrelated record links.
    artifact_refs: [data/events.json, data/exceptions.json, data/operation.json]
    resolution: Exception events and histories are reciprocal, recovery actions resolve the immediate canonical recovery state, and all four operational chains use connected attributed record links.
  - id: FIND-028
    severity: P1
    status: resolved
    title: Record coverage was generic rather than operationally substantive
    description: Every generated record used the same five generic facts, corrections targeted an unchanged display name, seven blocks and two contracts were inert, and measurements did not express workflow-specific vineyard quantities.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/operation.json,
        validation/data-coverage.json,
      ]
    resolution: Added explicit record-family and definition-specific fact profiles, activated all blocks and contracts, diversified vineyard quantities, and required substantive leaves, typed entities, state fields, and unit coverage.
  - id: FIND-029
    severity: P2
    status: resolved
    title: Generated chronology and decision outcomes were implausible
    description: Global append sequence regressed in recorded time, every workflow instance collapsed into a few hours, and modulo-selected decision outcomes contradicted several positive transitions.
    artifact_refs: [scripts/generate-data.ts, data/events.json]
    resolution: Global and per-instance chronology are monotonic, 40 workflows span multiple days, 18 span at least a week, seasonal windows are enforced, and every decision result uses a transition-consistent canonical outcome.
  - id: FIND-030
    severity: P1
    status: resolved
    title: Cross-workflow links asserted false operational semantics
    description: Non-chain links were selected by array position with rotating relation labels, connecting unrelated records such as intake quality to timekeeping and calibration to an annual questionnaire.
    artifact_refs: [scripts/generate-data.ts, data/operation.json]
    resolution: Replaced positional links with an explicit semantic tuple contract and relation-specific chronology; final output has 116 causal cross-workflow links and zero backward supports, documents, or fulfills edges.
  - id: FIND-031
    severity: P1
    status: resolved
    title: Multi-decision and exception recovery results lost meaning
    description: Events with several decision IDs stored only one outcome, and recovery actions pointed at later transitions that did not realize the action text or canonical immediate recovery state.
    artifact_refs:
      [schemas/events.schema.json, data/events.json, data/exceptions.json]
    resolution: Events now store one validated result per decision ID, and every exception recovery action cites the event and evidence that realize its described canonical transition.
  - id: FIND-032
    severity: P1
    status: resolved
    title: Contract and historical data did not realize their claims
    description: Both contract-fruit chains used one grower contract while the other had no crop-to-settlement path, record supersession was absent, and a corrected winery alias had no predecessor value.
    artifact_refs:
      [data/operation.json, data/README.md, control/DECISION_LOG.md]
    resolution: The two fruit contracts have distinct connected chains, BLK-009 retains historical and corrected winery aliases, and the season contains four reciprocal substantive supersessions.
  - id: FIND-033
    severity: P2
    status: resolved
    title: Time offsets precision and named evidence were inaccurate
    description: March events used daylight time before the 2026 transition, quantities exposed binary floating artifacts, and the named offline case cited an exception history without an offline event.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/events.json,
        validation/data-coverage.json,
      ]
    resolution: Pacific offsets follow the 2026 DST boundaries, quantities and money have bounded precision, and named evidence cites actual offline events and current generated identifiers.
  - id: FIND-034
    severity: P1
    status: resolved
    title: Definition-specific records carried misleading domain facts
    description: Structurally valid records reused facts from the wrong operational family, including Brix in soil and tissue records, pesticide restrictions in equipment verification, and assignment acknowledgement in a transport affidavit.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/operation.json,
        scripts/validation/season-data.mjs,
      ]
    resolution: Added explicit semantic profiles and required key/unit contracts for the affected definitions; final records contain domain-correct soil, tissue, equipment, labor, identity, transport, and audit facts.
  - id: FIND-035
    severity: P1
    status: resolved
    title: Supersession and corrected-weigh histories changed metadata rather than truth
    description: Predecessor and successor records preserved identical authoritative values while placing the claimed prior value only in supersession metadata; the corrected-weigh case also lacked a real weigh-bill predecessor and dated corrections before their targets.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/operation.json,
        validation/data-coverage.json,
      ]
    resolution: Predecessors now carry prior authoritative values, successors carry revised values, supersession requires a nonmetadata fact delta, corrected-weigh evidence has reciprocal REC-047 lineage, and 12 attributable corrections retain contiguous versions.
  - id: FIND-036
    severity: P1
    status: resolved
    title: Vineyard phenology contradicted event timing
    description: Crop-estimate and maturity workflows were scheduled during dormant or implausibly early months, and a January field signal described active canopy and shoot growth.
    artifact_refs:
      [scripts/generate-data.ts, data/events.json, data/operation.json]
    resolution: WF-004, WF-005, and WF-006 use enforced seasonal windows; dormant signals avoid active-canopy claims; each harvest actual is effective at its own workflow's actualization event.
  - id: FIND-037
    severity: P1
    status: resolved
    title: Cross-workflow links reversed causal and temporal direction
    description: Thirty-eight supports, documents, or fulfills links pointed backward in effective time, including delivery evidence supporting earlier labor records and loads supporting contracts that authorized them.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/operation.json,
        scripts/validation/season-data.mjs,
      ]
    resolution: Rebuilt chain and systemic links with explicit direction, relation-specific temporal guards, and creation times no earlier than either record; contract evidence now authorizes loads rather than the reverse.
  - id: FIND-038
    severity: P1
    status: resolved
    title: Harvest chain quantities and settlement evidence did not reconcile
    description: Singular weigh bills expressed eight to ten tons while delivery and settlement records used block-scale quantities up to ninety-six tons; load identity and settlement arithmetic therefore described different operational facts.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/operation.json,
        scripts/validation/season-data.mjs,
      ]
    resolution: Each chain now reconciles a single load ID, net pounds to entered short tons, and gross plus signed adjustments to net settlement; estate and contract-fruit chains pass the same arithmetic contract.
  - id: FIND-039
    severity: P1
    status: resolved
    title: Events exposed future measurements before the workflow produced them
    description: Each workflow instance reused one completed measurement snapshot on every event, exposing future weigh results, receipt quantities, variances, and forecast errors in authorization or sampling states.
    artifact_refs:
      [
        scripts/generate-data.ts,
        data/events.json,
        scripts/validation/season-data.mjs,
      ]
    resolution: Event measurements are derived from the current transition's record access and state; exact weights, receipts, variances, and forecast errors cannot appear before the workflow produces them.
  - id: FIND-040
    severity: P1
    status: resolved
    title: Changed-block case cited unrelated identity history
    description: The EXC-051 named case affected BLK-001 in September while its claimed alias and lineage evidence belonged to BLK-009 in June, so the flagship stable-identity scenario had no connected correction.
    artifact_refs:
      [data/exceptions.json, data/operation.json, validation/data-coverage.json]
    resolution: EXC-051 now affects BLK-009 and cites its own historical and corrected aliases, LIN-001 change, and local corrective evidence inside the exception recovery window.
  - id: FIND-041
    severity: P1
    status: resolved
    title: Crop actualization transitions omitted their stated record contracts
    description: TRN-WF-004-005 and TRN-WF-004-006 described linking and reconciling harvest actuals but declared no REC-033 or REC-034 reads and writes, allowing actualized states without actual evidence.
    artifact_refs:
      [
        workflow-model/workflows.json,
        scripts/refine-workflow-ontology.mjs,
        scripts/validation/season-data.mjs,
      ]
    resolution: The generated canonical contract now reads the published estimate, writes REC-033 at actualization, reads REC-033 at reconciliation, and writes REC-034; all five WF-004 instances and negative tests enforce the contract.
  - id: FIND-042
    severity: P1
    status: resolved
    title: Product trace relationships were positionally plausible but operationally false
    description: The first product candidate connected scenarios, requirements, screens, and transitions by category and ordinal distribution, allowing a linked scenario or screen to omit the transition a requirement claimed.
    artifact_refs:
      [
        scripts/generate-scenarios.ts,
        scripts/generate-product-model.ts,
        scripts/product-requirement-allocation.ts,
        product-structure/requirements.json,
      ]
    resolution: Requirements now use semantic transition affinity and exact scenario intersections; every realized requirement transition resolves in a named scenario and exact screen action.
  - id: FIND-043
    severity: P1
    status: resolved
    title: Canonical transition and role surface coverage was incomplete
    description: Product screens exposed only 133 of 235 canonical transitions, and several canonical role/workflow responsibilities had no inspectable product surface.
    artifact_refs:
      [
        product-structure/transition-dispositions.json,
        product-structure/role-surface-matrix.json,
        screens/screens.json,
      ]
    resolution: All 235 transitions have one explicit disposition and screen action, including 94 honestly labeled canonical-only branches; all 92 role/workflow relationships have an action or scoped review surface.
  - id: FIND-044
    severity: P1
    status: resolved
    title: Screen-state contracts exposed impossible or contradictory actions
    description: One hundred eighty-three state contracts placed the same action in available and blocked sets, and completion states exposed ordinary forward actions that were invalid from the terminal state.
    artifact_refs:
      [product-structure/state-matrix.json, schemas/screen-state.schema.json]
    resolution: State contracts are generated from an exact canonical current state, available and blocked actions are disjoint, and completion permits inspection plus only canonical terminal correction or supersession.
  - id: FIND-045
    severity: P1
    status: resolved
    title: Product actions lacked stable contextual policy contracts
    description: Actions embedded broad role permissions, notifications, and sync prose without stable rule identifiers; permission grants were Cartesian and could not prove exact transition ownership.
    artifact_refs:
      [
        product-structure/permissions.json,
        product-structure/notifications.json,
        product-structure/sync-model.json,
        screens/screens.json,
      ]
    resolution: Every consequential action names one transition-specific permission rule, one canonical notification rule, and one stable sync class; grants resolve the exact canonical owner and default denial remains explicit.
  - id: FIND-046
    severity: P1
    status: resolved
    title: Interaction flows were narrative rather than attributable
    description: Flow steps lacked exact event, action, fixture, actor, and record pointers, so a nominal path could name a screen the responsible actor could not access.
    artifact_refs:
      [product-structure/flows.json, schemas/product-flow.schema.json]
    resolution: All 20 flows resolve every step through an exact scenario, fixture, event, transition, action, screen, actor role, and selected record set, with separate terminals for independent multi-path evidence.
  - id: FIND-047
    severity: P1
    status: resolved
    title: Cross-workflow chronology and scenario aggregates asserted false continuity
    description: Multi-workflow events were flattened into one apparent chronology, one cross scenario used disconnected fixtures, another had the wrong category, and decision and record aggregates included values outside their exact event paths.
    artifact_refs: [scenarios/scenarios.json, schemas/scenario.schema.json]
    resolution: Cross-workflow scenarios preserve independent path segments and explicit link relations; the disconnected and misclassified scenarios were corrected; decisions, records, and expected transitions are exact event unions.
  - id: FIND-048
    severity: P2
    status: resolved
    title: Product infrastructure and component semantics were under-specified
    description: Several product registries had no schemas, and generic component assignment did not explain recurring vineyard information, action, state, accessibility, or platform needs.
    artifact_refs:
      [
        schemas,
        product-structure/component-requirements.json,
        product-structure/information-architecture.json,
      ]
    resolution: Added schemas for every product registry and replaced positional components with 36 category-specific semantic contracts, variants, states, accessibility behavior, and exact screen relationships.
  - id: FIND-049
    severity: P1
    status: resolved
    title: Screen notification copies contradicted canonical notification rules
    description: One hundred forty actions disagreed with their named rule about acknowledgement, and two urgent never-bundle consequences appeared routine inline.
    artifact_refs: [screens/screens.json, product-structure/notifications.json]
    resolution: Canonical and inline notification contracts now share one generator, and validation requires exact recipient, trigger, channel, urgency, and acknowledgement parity for every consequential action.
  - id: FIND-050
    severity: P1
    status: resolved
    title: Downgraded intake quality was incorrectly offline-capable
    description: TRN-WF-006-026 committed a quality disposition through the offline-safe class even though the canonical sync model requires current online authority for quality disposition.
    artifact_refs: [screens/screens.json, product-structure/sync-model.json]
    resolution: Every WF-006 quality-pending disposition, including downgrade, is SYNC-003 online-required; ontology-state validation rejects future regressions.
  - id: FIND-051
    severity: P1
    status: resolved
    title: Multi-path validation accepted unrelated link and chain identifiers
    description: The validator proved referenced links and chains existed but did not prove that their endpoints connected selected evidence across path segments, so an unrelated valid identifier could pass.
    artifact_refs:
      [scripts/validation/product-model.mjs, scenarios/scenarios.json]
    resolution: Every non-entry segment must graph-connect its exact event records to prior selected evidence, and every claimed operational chain must intersect selected workflow instances and linked evidence records.
