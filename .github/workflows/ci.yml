name: ci

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint source
        run: npm run lint

      - name: Check types
        run: npm run typecheck

      - name: Validate schemas, traceability, and data
        run: npm run validate:all

      - name: Validate design tokens and generated CSS
        run: npm run validate:tokens && npm run validate:tokens-current && npm run validate:visual-directions

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production atlas
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atlas-production-build
          path: dist
          if-no-files-found: error
          retention-days: 7
