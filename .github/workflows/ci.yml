name: ci

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint source
        run: npm run lint

      - name: Check types
        run: npm run typecheck

      - name: Validate schemas, traceability, and data
        run: npm run validate:all

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production atlas
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: atlas-production-build
          path: dist
          if-no-files-found: error
          retention-days: 7
