name: visual-validation

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  browser:
    name: browser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production atlas
        run: npm run build

      - name: Render canonical workflow diagrams
        run: npm run render:workflow-visuals

      - name: Run browser, responsive, and accessibility checks
        run: npm run test:browser

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-validation-evidence
          path: |
            playwright-report
            test-results
            validation/visual-direction-renders
          if-no-files-found: ignore
          retention-days: 14
